name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Стабильная версия для Flet
          channel: 'stable'

      - name: Install dependencies
        run: |
          pip install flet
          
      - name: Build APK
        run: flet build apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_social_app_apk
          path: build/apk/*.apk
